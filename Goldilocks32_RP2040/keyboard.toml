# Documentation: https://rmk.rs/docs/configuration.html
[keyboard]
name = "Goldilocks32 RP2040"
product_name = "Goldilocks"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "RMK"
chip = "rp2040"

[matrix]
# Define matrix pins, scanning matrix is 8 rows (potentially 9), 16 cols:
row_pins = [
    "PIN_21", "PIN_11", "PIN_16", "PIN_23", "PIN_0",
    "PIN_10", "PIN_1", "PIN_8" #, "PIN_6"
]
col_pins = [
    "PIN_28", "PIN_22", "PIN_15", "PIN_7", "PIN_2",
    "PIN_26", "PIN_12", "PIN_5", "PIN_4", "PIN_14",
    "PIN_27", "PIN_3", "PIN_13", "PIN_9", "PIN_20",
    "PIN_29"
]

# There are no diodes on this design, so this should make no difference?
row2col = true

[layout]
# Using a physical matrix layout of 3 rows, 10 cols (30 keys only, ignoring 5-way button and optional thumb keys)
# That reduces scanning matrix from 9 rows, 16 columns, to only 8 rows (GPIO 6 is only used for the 5-way nav).
# It also makes the layout identical to the Rugby Union so can use the same keymap as is.
rows = 8
cols = 16
layers = 6
matrix_map = """
(0, 0, L)  (0, 1, L)  (0, 2, L)  (0, 3, L)  (4, 4, L)    (6, 11, R)  (5, 12, R)  (6, 13, R)  (5, 14, R)  (2, 15, R)
(1, 0, L)  (2, 1, L)  (3, 2, L)  (4, 3, L)  (7, 4, L)    (4, 11, R)  (4, 12, R)  (1, 13, R)  (1, 14, R)  (6, 15, R)
(7, 5, L)  (1, 5, L)  (2, 6, L)  (7, 6, L)  (3, 7, L)    (2,  8, R)  (5,  9, R)  (3,  9, R)  (3, 10, R)  (6, 10, R)
"""

[[layer]]
name = "base_layer"
keys = """
Q W E R T Y U I O P
A S D F G H J K L Semicolon
Z X C V B N M Comma Dot Slash
"""

[host]
# Vial Unlock combination: simultaneous press of specified keys
unlock_keys = [[0, 0], [0, 9]]  # Q and P
